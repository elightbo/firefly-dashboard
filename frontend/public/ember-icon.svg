<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#9a3412"/>
    </linearGradient>
    <linearGradient id="flame" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#fef08a"/>
      <stop offset="40%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="72%" r="28%">
      <stop offset="0%" stop-color="#fff7ed" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#fff7ed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background (iOS-style) -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Main flame -->
  <path d="
    M 50 14
    C 50 14, 61 26, 64 38
    C 67 30, 65 21, 61 15
    C 70 25, 74 38, 71 52
    C 74 46, 75 38, 72 30
    C 80 43, 79 59, 73 70
    C 67 79, 59 84, 50 84
    C 41 84, 33 79, 27 70
    C 21 59, 20 43, 28 30
    C 25 38, 26 46, 29 52
    C 26 38, 30 25, 39 15
    C 35 21, 33 30, 36 38
    C 39 26, 50 14, 50 14
    Z
  " fill="url(#flame)"/>

  <!-- Inner ember glow -->
  <ellipse cx="50" cy="68" rx="13" ry="9" fill="url(#glow)"/>
</svg>
