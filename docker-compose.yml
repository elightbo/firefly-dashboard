services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
      POSTGRES_DB: budget
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget -d budget"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://budget:budget@db:5432/budget
      FIREFLY_BASE_URL: ${FIREFLY_BASE_URL}
      FIREFLY_TOKEN: ${FIREFLY_TOKEN}
      PORT: 3001
    ports:
      - "3001:3001"
    profiles:
      - full

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"
    profiles:
      - full

volumes:
  db_data:
