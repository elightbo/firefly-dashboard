services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: budget
      POSTGRES_PASSWORD: budget
      POSTGRES_DB: budget
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U budget -d budget"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://budget:budget@db:5432/budget
      FIREFLY_BASE_URL: ${FIREFLY_BASE_URL}
      FIREFLY_TOKEN: ${FIREFLY_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-4-6}
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  # Named volume — Docker manages the location.
  # On Unraid this lands in /var/lib/docker/volumes/ by default.
  # If you prefer a specific path (e.g. /mnt/user/appdata/budget/db),
  # replace with a bind mount:
  #   driver: local
  #   driver_opts:
  #     type: none
  #     o: bind
  #     device: /mnt/user/appdata/budget/db
  db_data:
